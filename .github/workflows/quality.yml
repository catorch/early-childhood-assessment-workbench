name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: help_review
          POSTGRES_PASSWORD: help_review_ci
          POSTGRES_DB: help_review
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U help_review -d help_review"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://help_review:help_review_ci@127.0.0.1:5432/help_review
      DIRECT_URL: postgresql://help_review:help_review_ci@127.0.0.1:5432/help_review
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: git diff --check
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm catalog:validate content/help-catalog.sanitized.json
      - run: pnpm db:validate
      - run: pnpm db:migrate
      - run: pnpm db:status
      - run: pnpm db:rate-limit-drill -- --confirm-sanitized-database
      - run: pnpm build:processor
      - uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=infra/gcp fmt -check -recursive
      - run: terraform -chdir=infra/gcp init -backend=false
      - run: terraform -chdir=infra/gcp validate
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - run: pnpm test:a11y
      - run: pnpm test:visual
      - name: Production web build with acknowledged GCP adapters
        run: pnpm build
        env:
          HELP_REVIEW_SANITIZED_PRODUCTION_ACK: "true"
          HELP_REVIEW_REAL_DATA_ENABLED: "false"
          HELP_REVIEW_STATE_ADAPTER: neon
          HELP_REVIEW_VIDEO_ADAPTER: gcs
          HELP_REVIEW_PROCESSING_ADAPTER: gcs-event
          HELP_REVIEW_SCORING_ADAPTER: vertex
          HELP_REVIEW_IDENTITY_ADAPTER: identity-platform
          HELP_REVIEW_IDENTITY_PLATFORM_PROJECT_ID: help-review-ci
          HELP_REVIEW_IDENTITY_PLATFORM_API_KEY: restricted-ci-browser-key
          HELP_REVIEW_HELP_CATALOG_PATH: content/help-catalog.sanitized.json
          HELP_REVIEW_HELP_CATALOG_VERSION: help-2-provisional-2026-07
          HELP_REVIEW_HELP_CATALOG_SHA256: 7d604579d6c8f8fdf5ac0f3d0ef0643a1d4479806d6d6be38cb1bc2f92c451d2
          NEXT_PUBLIC_HELP_REVIEW_SUPPORT_EMAIL: ci-support@help-review.dev
          GCS_VIDEO_BUCKET: ci-private-video-bucket
          GOOGLE_CLOUD_PROJECT: help-review-ci
          VERTEX_AI_LOCATION: us-central1
          VERTEX_AI_MODEL: gemini-2.5-flash
          HELP_REVIEW_SESSION_SECRET: ci-session-secret-with-at-least-32-characters
          HELP_REVIEW_PLAYBACK_GRANT_SECRET: ci-playback-secret-with-at-least-32-characters
          HELP_REVIEW_UPLOAD_GRANT_SECRET: ci-upload-secret-with-at-least-32-characters
          HELP_REVIEW_WORKER_SECRET: ci-worker-secret-with-at-least-32-characters
      - name: Publish Playwright diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          path: |
            test-results/
            playwright-report/
          retention-days: 7
