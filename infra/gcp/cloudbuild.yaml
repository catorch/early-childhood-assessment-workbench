substitutions:
  _REGION: us-central1
  _REPOSITORY: help-review
  _TAG: dev

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=Dockerfile
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/web:${_TAG}
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=Dockerfile.processor
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/processor:${_TAG}
      - .

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/web:${_TAG}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/processor:${_TAG}

options:
  logging: CLOUD_LOGGING_ONLY
